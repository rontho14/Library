<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Grenze+Gotisch:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="body">
        <section class="header">
          <div class="title">Library</div>
          <button type="button" id="add-button">+</button>
        </section>
        <section class="books">
          <div class="book">
            <div class="title">Jesus in the Talmud</div>
            <div class="author">Peter Schafer</div>
            <img src="./images/jesusInTheTalmud.jpg" />
            <div class="status">
              <input type="checkbox" id="bookStatus" />
              <label for="bookStatus">To-read</label>
            </div>
          </div>
        </section>
      </div>

      <dialog id="addBookModal">
        <form class="bookModal" method="dialog">
          <h2>Add Book</h2>

          <div class="close-button">
            <button class="close-form-button">x</button>
          </div>
          <div class="title">
            <label>
              Title:

              <input type="text" name="Title" id="bookTitle" required/>
            </label>
          </div>

          <div class="author">
            <label>
              Author:

              <input type="text" name="Author" id="bookAuthor" required/>
            </label>
          </div>

          <div class="book-image">
            <label>
              Book Image:

              <input
                type="file"
                id="imageUpload"
                name="book-pic"
                accept=".png, .jpeg"
              />
            </label>
          </div>

          <div class="book-status">
            <input type="checkbox" id="bookStatus" name="status" />
            <label>To-Read</label>
          </div>

          <div class="addBook">
            <button id="addBook">Add Book</button>
          </div>
        </form>
      </dialog>
    </div>
    <script src="script.js"></script>
  </body>
</html>
